name: CI — Lint & Build

on:
  push:
    branches-ignore:
      - "dependabot/**"
  pull_request:
    branches:
      - master
      - main
      - "feat/**"
      - "fix/**"

jobs:
  # ─────────────────────────────────────────────
  # Backend: Go build + test
  # ─────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./main.go

      - name: Test
        run: go test ./... -timeout 60s

  # ─────────────────────────────────────────────
  # Frontend: Bun install + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (Nuxt / Bun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run nuxi typecheck
        continue-on-error: true

      - name: Build
        run: bun run build
        env:
          NUXT_BACKEND_URL: http://localhost:8080

  # ─────────────────────────────────────────────
  # Docker: Compose build check (no push)
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create env from template
        run: cp docker/envs/.env.development.example docker/.env

      - name: Build images (no push)
        working-directory: docker
        run: docker compose build
