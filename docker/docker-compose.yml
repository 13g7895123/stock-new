
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stock_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-stockdb}
    ports:
      - "${DB_PORT_EXPOSED:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stock_backend
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_INTERNAL_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-stockdb}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: stock_frontend
    environment:
      NUXT_BACKEND_URL: http://backend:${BACKEND_INTERNAL_PORT:-8080}
    depends_on:
      - backend
    networks:
      - stock-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stock_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-net

  nginx:
    image: nginx:1.27-alpine
    container_name: stock_nginx
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - pgadmin
    restart: unless-stopped
    networks:
      - stock-net

networks:
  stock-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.99.0.0/24

volumes:
  postgres_data:
  pgadmin_data:
