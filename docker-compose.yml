
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: stock_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-stockdb}
    ports:
      - "${DB_PORT_EXPOSED:-15433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_backend
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_INTERNAL_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-stockdb}
      CHIPS_SCRAPER_URL: http://chips_scraper:5100
    ports:
      - "${BACKEND_PORT:-8086}:${BACKEND_INTERNAL_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stock_frontend
    environment:
      NUXT_BACKEND_URL: http://backend:${BACKEND_INTERNAL_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    depends_on:
      - backend
    networks:
      - stock-net

  chips_scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: chips_scraper
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASS:-postgres}@postgres:5432/${DB_NAME:-stockdb}
      SCRAPER_PORT: 5100
      CONCURRENCY: ${CHIPS_CONCURRENCY:-3}
      REQUEST_DELAY: ${CHIPS_REQUEST_DELAY:-2.0}
      HEADLESS: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stock-net

networks:
  stock-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.99.0.0/24

volumes:
  postgres_data:
